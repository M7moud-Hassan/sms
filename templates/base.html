  <!-- في base.html، ضمن شريط التنقل -->


<script>
    (function() {
        // فقط للمستخدمين المسجلين (staff)
        {% if user.is_authenticated and user.is_staff %}
        let lastCount = 0;
        const bellCount = document.getElementById('bellCount');
        const bellIcon = document.getElementById('bellIcon');

        // دالة لتوليد صوت بسيط باستخدام Web Audio API
        function playBellSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // نغمة عالية
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        }

        // دالة لفحص الطلبات الجديدة
        function checkNewRequests() {
            fetch('{% url "check_new_requests" %}')
                .then(response => response.json())
                .then(data => {
                    const count = data.count;
                    if (count > lastCount) {
                        // هناك طلبات جديدة – أصدر صوتاً
                        playBellSound();
                    }
                    if (count > 0) {
                        bellCount.innerText = count;
                        bellCount.style.display = 'inline';
                    } else {
                        bellCount.style.display = 'none';
                    }
                    lastCount = count;
                })
                .catch(err => console.error('Error checking new requests:', err));
        }

        // عند النقر على الجرس، نعيد ضبط العداد ونحدث وقت المشاهدة
        bellIcon.addEventListener('click', function(e) {
            e.preventDefault();
            fetch('{% url "mark_requests_seen" %}', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(() => {
                bellCount.style.display = 'none';
                lastCount = 0;
            });
        });

        // فحص كل 5 ثوانٍ (طبقة احتياطية لو الـ push اتأخر أو فشل)
        setInterval(checkNewRequests, 5000);

        // فحص فوري عند تحميل الصفحة
        checkNewRequests();

        // ---------- Firebase push (instant layer on top of the polling above) ----------
        (function setupStaffPush() {
            const firebaseConfig = {{ firebase_web_config_json|safe }};
            if (!firebaseConfig.apiKey || !('serviceWorker' in navigator) || !('Notification' in window)) {
                return;  // Firebase not configured yet, or unsupported browser
            }
            firebase.initializeApp(firebaseConfig);
            const messaging = firebase.messaging();

            navigator.serviceWorker.register('/firebase-messaging-sw.js').then(function(registration) {
                Notification.requestPermission().then(function(permission) {
                    if (permission !== 'granted') return;
                    messaging.getToken({
                        vapidKey: '{{ firebase_vapid_key }}',
                        serviceWorkerRegistration: registration
                    }).then(function(token) {
                        if (!token) return;
                        fetch('{% url "register_fcm_token" %}', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ token: token })
                        }).catch(err => console.error('FCM token registration failed:', err));
                    }).catch(err => console.error('FCM getToken failed:', err));
                });
            }).catch(err => console.error('Service worker registration failed:', err));

            // Foreground message: play the same bell sound and refresh the count immediately.
            messaging.onMessage(function(payload) {
                playBellSound();
                checkNewRequests();
            });
        })();
        {% endif %}
    })();
</script>
</html>

<!-- Add Category Modal -->
<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-labelledby="addCategoryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title" id="addCategoryModalLabel"><i class="bi bi-tag"></i> New Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="post" action="{% url 'category_add' %}" id="addCategoryForm">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="cat_name" class="form-label fw-bold">Category Name *</label>
                        <input type="text" name="name" id="cat_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="cat_description" class="form-label fw-bold">Description</label>
                        <textarea name="description" id="cat_description" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="cat_price" class="form-label fw-bold">Price *</label>
                        <input type="number" step="0.01" name="price" id="cat_price" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-warning"><i class="bi bi-save"></i> Save Category</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    (function() {
        const form = document.getElementById('addCategoryForm');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('addCategoryModal')).hide();
                        location.reload();
                    } else {
                        alert('Please correct the errors.');
                    }
                })
                .catch(error => console.error('Error:', error));
            });
        }
    })();
</script>

<!-- Add Service Modal -->
<div class="modal fade" id="addServiceModal" tabindex="-1" aria-labelledby="addServiceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title" id="addServiceModalLabel"><i class="bi bi-gear"></i> New Service</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="post" action="{% url 'service_add' %}" id="addServiceForm">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="service_name" class="form-label fw-bold">Service Name *</label>
                        <input type="text" name="name" id="service_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="service_description" class="form-label fw-bold">Description</label>
                        <textarea name="description" id="service_description" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="service_category" class="form-label fw-bold">Category *</label>
                        <select name="category" id="service_category" class="form-select" required>
                            <option value="">-- Select Category --</option>
                            {% for category in categories %}
                            <option value="{{ category.pk }}">{{ category.name }} (${{ category.price }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="service_location_type" class="form-label fw-bold">Location Type</label>
                        <select name="location_type" id="service_location_type" class="form-select">
                            <option value="1">Single Location</option>
                            <option value="2">Pickup and Dropoff</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-info"><i class="bi bi-save"></i> Save Service</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    (function() {
        const form = document.getElementById('addServiceForm');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('addServiceModal')).hide();
                        location.reload();
                    } else {
                        alert('Please correct the errors.');
                    }
                })
                .catch(error => console.error('Error:', error));
            });
        }
    })();
</script>

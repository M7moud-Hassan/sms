<!-- Edit Customer Modal -->
<div class="modal fade" id="editCustomerModal{{ customer.pk }}" tabindex="-1" aria-labelledby="editCustomerModalLabel{{ customer.pk }}" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title" id="editCustomerModalLabel{{ customer.pk }}"><i class="bi bi-pencil-square"></i> Edit Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="post" action="{% url 'customer_edit' customer.pk %}" id="editCustomerForm{{ customer.pk }}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="id_name_{{ customer.pk }}" class="form-label fw-bold">Full Name *</label>
                        <input type="text" name="name" id="id_name_{{ customer.pk }}" class="form-control" value="{{ customer.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_phone_{{ customer.pk }}" class="form-label fw-bold">Phone</label>
                        <input type="text" name="phone" id="id_phone_{{ customer.pk }}" class="form-control" value="{{ customer.phone|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label for="id_email_{{ customer.pk }}" class="form-label fw-bold">Email</label>
                        <input type="email" name="email" id="id_email_{{ customer.pk }}" class="form-control" value="{{ customer.email|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label for="id_address_{{ customer.pk }}" class="form-label fw-bold">Address</label>
                        <textarea name="address" id="id_address_{{ customer.pk }}" class="form-control" rows="2">{{ customer.address|default:'' }}</textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-warning"><i class="bi bi-save"></i> Update Customer</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    (function() {
        const form = document.getElementById('editCustomerForm{{ customer.pk }}');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('editCustomerModal{{ customer.pk }}')).hide();
                        location.reload();
                    } else {
                        alert('Please correct the errors.');
                    }
                })
                .catch(error => console.error('Error:', error));
            });
        }
    })();
</script>

<!-- Edit Card Modal -->
<div class="modal fade" id="editCardModal{{ card.pk }}" tabindex="-1" aria-labelledby="editCardModalLabel{{ card.pk }}" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title" id="editCardModalLabel{{ card.pk }}"><i class="bi bi-pencil-square"></i> Edit Card #{{ card.number_card }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="post" action="{% url 'card_edit' card.pk %}" id="editCardForm{{ card.pk }}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="id_customer_{{ card.pk }}" class="form-label fw-bold">Customer *</label>
                            <select name="customer" id="id_customer_{{ card.pk }}" class="form-select" required>
                                {% for customer in customers %}
                                <option value="{{ customer.pk }}" {% if card.customer.pk == customer.pk %}selected{% endif %}>{{ customer.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="id_category_{{ card.pk }}" class="form-label fw-bold">Category</label>
                            <select name="category" id="id_category_{{ card.pk }}" class="form-select">
                                <option value="">-- None --</option>
                                {% for cat in categories %}
                                <option value="{{ cat.pk }}" {% if card.category and card.category.pk == cat.pk %}selected{% endif %}>{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="id_vehicle_number_{{ card.pk }}" class="form-label fw-bold">Vehicle Number</label>
                            <input type="text" name="vehicle_number" id="id_vehicle_number_{{ card.pk }}" class="form-control" value="{{ card.vehicle_number|default:'' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="id_chassis_number_{{ card.pk }}" class="form-label fw-bold">Chassis Number</label>
                            <input type="text" name="chassis_number" id="id_chassis_number_{{ card.pk }}" class="form-control" value="{{ card.chassis_number|default:'' }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="id_end_at_{{ card.pk }}" class="form-label fw-bold">Expiration Date</label>
                            <input type="date" name="end_at" id="id_end_at_{{ card.pk }}" class="form-control" value="{{ card.end_at|date:'Y-m-d' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-check mt-4">
                                <input class="form-check-input" type="checkbox" name="is_active" id="id_is_active_{{ card.pk }}" {% if card.is_active %}checked{% endif %}>
                                <label class="form-check-label fw-bold" for="id_is_active_{{ card.pk }}">
                                    Active card
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-warning"><i class="bi bi-save"></i> Update Card</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    (function() {
        const form = document.getElementById('editCardForm{{ card.pk }}');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('editCardModal{{ card.pk }}')).hide();
                        location.reload();
                    } else {
                        alert('Please correct the errors.');
                    }
                })
                .catch(error => console.error('Error:', error));
            });
        }
    })();
</script>

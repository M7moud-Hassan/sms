<!-- Add Showroom Modal -->
<div class="modal fade" id="addShowroomModal" tabindex="-1" aria-labelledby="addShowroomModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="addShowroomModalLabel"><i class="bi bi-shop"></i> New Sponsor</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="post" action="{% url 'showroom_add' %}" id="addShowroomForm">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="id_showroom_name" class="form-label fw-bold">Sponsor Name *</label>
                        <input type="text" name="name" id="id_showroom_name" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Sponsor</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    (function() {
        const showroomModalEl = document.getElementById('addShowroomModal');

        showroomModalEl.addEventListener('show.bs.modal', function() {
            this.style.zIndex = 1065;
        });
        showroomModalEl.addEventListener('shown.bs.modal', function() {
            const backdrops = document.querySelectorAll('.modal-backdrop');
            if (backdrops.length > 0) {
                backdrops[backdrops.length - 1].style.zIndex = 1060;
            }
        });

        const form = document.getElementById('addShowroomForm');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        bootstrap.Modal.getInstance(showroomModalEl).hide();
                        form.reset();
                        document.dispatchEvent(new CustomEvent('showroomAdded', {
                            detail: { id: data.showroom_id, name: data.showroom_name }
                        }));
                    } else {
                        alert('Please correct the errors.');
                    }
                })
                .catch(error => console.error('Error:', error));
            });
        }
    })();
</script>

<!-- JobBox Modal for Request {{ request.pk }} -->
<div class="modal fade" id="missionModal{{ request.pk }}" tabindex="-1" aria-labelledby="missionModalLabel{{ request.pk }}" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="missionModalLabel{{ request.pk }}">
                    <i class="bi bi-truck"></i> JobBox
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="post" action="{% url 'create_update_mission' request.pk %}" id="missionForm{{ request.pk }}">
                {% csrf_token %}
                <div class="modal-body">
                    <!-- Customer (read‑only) -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Customer</label>
                        <input type="text" class="form-control" value="{{ request.card.customer.name }}" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone</label>
                        <input type="text" class="form-control" value="{{ request.contact_phone|default:request.card.customer.phone|default:'—' }}" readonly>
                    </div>
                    <!-- Service (read‑only) -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Service</label>
                        <input type="text" class="form-control" value="{{ request.service.name }}" readonly>
                    </div>
                    <!-- Driver -->
                    <div class="mb-3">
                        <label for="driver{{ request.pk }}" class="form-label fw-bold">Driver *</label>
                        <select name="driver" id="driver{{ request.pk }}" class="form-select" required>
                            <option value="">-- Select Driver --</option>
                            {% for driver in drivers %}
                            <option value="{{ driver.id }}" {% if request.mission and request.mission.driver.id == driver.id %}selected{% endif %}>
                                {{ driver.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <!-- Date -->
                    <div class="mb-3">
                        <label for="date{{ request.pk }}" class="form-label fw-bold">Mission Date</label>
                        <input type="date" name="date" id="date{{ request.pk }}" class="form-control" value="{{ request.mission.date|date:'Y-m-d' }}">
                    </div>

                    <!-- Dynamic location fields based on service type -->
                    {% if request.service.location_type == 2 %}
                        <!-- Two locations -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="from_location{{ request.pk }}" class="form-label fw-bold">Receiving Location</label>
                                <input type="text" name="from_location" id="from_location{{ request.pk }}" class="form-control"
                                       value="{% if request.mission %}{{ request.mission.from_location }}{% else %}{{ request.from_location }}{% endif %}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="to_location{{ request.pk }}" class="form-label fw-bold">Delivery Location</label>
                                <input type="text" name="to_location" id="to_location{{ request.pk }}" class="form-control"
                                       value="{% if request.mission %}{{ request.mission.to_location }}{% else %}{{ request.to_location }}{% endif %}">
                            </div>
                        </div>
                    {% else %}
                        <!-- One location -->
                        <div class="mb-3">
                            <label for="from_location{{ request.pk }}" class="form-label fw-bold">Location</label>
                            <input type="text" name="from_location" id="from_location{{ request.pk }}" class="form-control"
                                   value="{% if request.mission %}{{ request.mission.from_location }}{% else %}{{ request.from_location }}{% endif %}">
                        </div>
                        <input type="hidden" name="to_location" value="">
                    {% endif %}

                    <!-- Cost -->
                    <div class="mb-3">
                        <label for="cost{{ request.pk }}" class="form-label fw-bold">Cost</label>
                        <input type="number" step="0.01" name="cost" id="cost{{ request.pk }}" class="form-control"
                               value="{{ request.mission.cost|default:'0' }}" required>
                    </div>

                    <!-- Notes -->
                    <div class="mb-3">
                        <label for="notes{{ request.pk }}" class="form-label fw-bold">Notes</label>
                        <textarea name="notes" id="notes{{ request.pk }}" class="form-control" rows="2">{{ request.mission.notes|default:'' }}</textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" id="submitBtn{{ request.pk }}" class="btn btn-primary">
                        <i class="bi bi-save"></i> {% if request.mission %}Update Mission{% else %}Add Mission{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    (function() {
        const form = document.getElementById('missionForm{{ request.pk }}');
        const submitBtn = document.getElementById('submitBtn{{ request.pk }}');
        
        if (!form) {
            console.error('Form not found: missionForm{{ request.pk }}');
            return;
        }
        if (!submitBtn) {
            console.error('Submit button not found: submitBtn{{ request.pk }}');
            return;
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Saving...';
            submitBtn.disabled = true;

            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('missionModal{{ request.pk }}')).hide();
                    location.reload();
                } else {
                    alert('Please correct the errors.');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred.');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            });
        });
    })();
</script>

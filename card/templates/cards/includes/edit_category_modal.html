<!-- Edit Category Modal -->
<div class="modal fade" id="editCategoryModal{{ category.pk }}" tabindex="-1" aria-labelledby="editCategoryModalLabel{{ category.pk }}" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title" id="editCategoryModalLabel{{ category.pk }}"><i class="bi bi-pencil-square"></i> Edit Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="post" action="{% url 'category_edit' category.pk %}" id="editCategoryForm{{ category.pk }}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="cat_name_{{ category.pk }}" class="form-label fw-bold">Category Name *</label>
                        <input type="text" name="name" id="cat_name_{{ category.pk }}" class="form-control" value="{{ category.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="cat_description_{{ category.pk }}" class="form-label fw-bold">Description</label>
                        <textarea name="description" id="cat_description_{{ category.pk }}" class="form-control" rows="3">{{ category.description }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="cat_price_{{ category.pk }}" class="form-label fw-bold">Price*</label>
                        <input type="number" step="0.01" name="price" id="cat_price_{{ category.pk }}" class="form-control" value="{{ category.price }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="cat_default_quota_{{ category.pk }}" class="form-label fw-bold">Default Quota per Service</label>
                        <input type="number" name="default_quota" id="cat_default_quota_{{ category.pk }}" class="form-control" min="1" value="{{ category.default_quota }}">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-warning"><i class="bi bi-save"></i> Update Category</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    (function() {
        const form = document.getElementById('editCategoryForm{{ category.pk }}');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('editCategoryModal{{ category.pk }}')).hide();
                        location.reload();
                    } else {
                        alert('Please correct the errors.');
                    }
                })
                .catch(error => console.error('Error:', error));
            });
        }
    })();
</script>

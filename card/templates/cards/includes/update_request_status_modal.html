<!-- Update Request Status Modal -->
<div class="modal fade" id="updateStatusModal{{ request.pk }}" tabindex="-1" aria-labelledby="updateStatusModalLabel{{ request.pk }}" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title" id="updateStatusModalLabel{{ request.pk }}"><i class="bi bi-pencil-square"></i> Update Request #{{ request.request_number }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="post" action="{% url 'update_request_status' request.pk %}" id="updateStatusForm{{ request.pk }}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="status_{{ request.pk }}" class="form-label fw-bold">Status</label>
                        <select name="status" id="status_{{ request.pk }}" class="form-select">
                            {% for value, label in request.STATUS_CHOICES %}
                            <option value="{{ value }}" {% if request.status == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="notes_{{ request.pk }}" class="form-label fw-bold">Notes</label>
                        <textarea name="notes" id="notes_{{ request.pk }}" class="form-control" rows="3">{{ request.notes|default:'' }}</textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-warning"><i class="bi bi-save"></i> Update</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    (function() {
        const form = document.getElementById('updateStatusForm{{ request.pk }}');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('updateStatusModal{{ request.pk }}')).hide();
                        location.reload();
                    } else {
                        alert('Please correct the errors.');
                    }
                })
                .catch(error => console.error('Error:', error));
            });
        }
    })();
</script>

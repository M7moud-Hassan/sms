<!-- Add Customer Modal -->
<div class="modal fade" id="addCustomerModal" tabindex="-1" aria-labelledby="addCustomerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="addCustomerModalLabel"><i class="bi bi-person-plus"></i> New Customer</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="post" action="{% url 'customer_add' %}" id="addCustomerForm">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="id_name" class="form-label fw-bold">Full Name *</label>
                        <input type="text" name="name" id="id_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_phone" class="form-label fw-bold">Phone</label>
                        <input type="text" name="phone" id="id_phone" class="form-control" placeholder="+1234567890">
                    </div>
                    <div class="mb-3">
                        <label for="id_email" class="form-label fw-bold">Email</label>
                        <input type="email" name="email" id="id_email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="id_address" class="form-label fw-bold">Address</label>
                        <textarea name="address" id="id_address" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Customer</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    (function() {
        const form = document.getElementById('addCustomerForm');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('addCustomerModal')).hide();
                        location.reload();
                    } else {
                        alert('Please correct the errors.');
                    }
                })
                .catch(error => console.error('Error:', error));
            });
        }
    })();
</script>

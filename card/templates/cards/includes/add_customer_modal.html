<!-- Add Customer Modal -->
<div class="modal fade" id="addCustomerModal" tabindex="-1" aria-labelledby="addCustomerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="addCustomerModalLabel"><i class="bi bi-person-plus"></i> New Cardholder</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="post" action="{% url 'customer_add' %}" id="addCustomerForm" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="id_name" class="form-label fw-bold">Full Name *</label>
                        <input type="text" name="name" id="id_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_phone" class="form-label fw-bold">Phone</label>
                        <input type="text" name="phone" id="id_phone" class="form-control" placeholder="+1234567890">
                    </div>
                    <div class="mb-3">
                        <label for="id_email" class="form-label fw-bold">Email</label>
                        <input type="email" name="email" id="id_email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="id_address" class="form-label fw-bold">Address</label>
                        <textarea name="address" id="id_address" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="id_payment" class="form-label fw-bold">Payment System</label>
                        <select name="payment" id="id_payment" class="form-select">
                            <option value="cash" selected>Cash</option>
                            <option value="credit">Credit</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="id_logo" class="form-label fw-bold">Logo</label>
                        <input type="file" name="logo" id="id_logo" class="form-control" accept="image/*">
                    </div>
                    <div class="mb-3">
                        <label for="id_notes" class="form-label fw-bold">Notes</label>
                        <textarea name="notes" id="id_notes" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Cardholder</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    (function() {
        const customerModalEl = document.getElementById('addCustomerModal');

        customerModalEl.addEventListener('show.bs.modal', function() {
            this.style.zIndex = 1065;
        });
        customerModalEl.addEventListener('shown.bs.modal', function() {
            const backdrops = document.querySelectorAll('.modal-backdrop');
            if (backdrops.length > 0) {
                backdrops[backdrops.length - 1].style.zIndex = 1060;
            }
        });

        const form = document.getElementById('addCustomerForm');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('addCustomerModal')).hide();
                        document.dispatchEvent(new CustomEvent('customerAdded', {
                            detail: { id: data.customer_id, name: data.customer_name }
                        }));
                        const anyCardModalOpen = document.querySelector('.modal.show[id*="addCard"]');
                        if (!anyCardModalOpen) {
                            location.reload();
                        }
                    } else {
                        alert('Please correct the errors.');
                    }
                })
                .catch(error => console.error('Error:', error));
            });
        }
    })();
</script>
